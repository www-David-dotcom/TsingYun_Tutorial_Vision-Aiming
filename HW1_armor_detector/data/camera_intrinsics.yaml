# Pinhole intrinsics reference for the Unity gimbal camera.
#
# The current synthetic dataset dumper does not consume this file; it is kept
# as legacy calibration reference for future Unity label-dump tooling.

width: 1280
height: 720
fov_y_deg: 60.0
# Computed: fy = (height / 2) / tan(fov_y / 2) = 360 / tan(30°) = 623.538
fy: 623.538290
# Square pixels.
fx: 623.538290
cx: 640.0
cy: 360.0

# Plate geometry reference used to size future projected labels.
plate_world:
  width_m: 0.14
  height_m: 0.13

# Visibility heuristic. Stage 3 doesn't raycast — a plate is "visible"
# if both:
#   - its centre projects inside [0, width) x [0, height), and
#   - the dot product of its outward-facing normal with the
#     camera-to-plate direction is below this threshold (i.e. the plate
#     is facing the camera, not away from it).
visibility:
  facing_dot_max: -0.15
