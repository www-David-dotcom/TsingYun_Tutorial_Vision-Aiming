syntax = "proto3";

package tsingyun.aiming.v1;

// Per-episode telemetry the simulator emits at end-of-episode. This is
// the structured input that any later grading policy will be a function
// over (see schema §1.3 and §7).

message ProjectileEvent {
    uint64 stamp_ns = 1;
    enum Kind {
        KIND_UNSPECIFIED = 0;
        KIND_FIRED       = 1;
        KIND_HIT_ARMOR   = 2;
        KIND_HIT_WALL    = 3;
        KIND_MISS_RANGE  = 4;
    }
    Kind kind = 2;
    // Target armor identifier, e.g. "red.front" / "blue.back". Empty for
    // FIRED / HIT_WALL / MISS_RANGE events.
    string armor_id = 3;
    // For HIT_ARMOR events, damage applied (after armor type discount).
    uint32 damage = 4;
}

message EpisodeStats {
    string  episode_id    = 1;
    uint64  seed          = 2;
    uint64  duration_ns   = 3;

    // Identifies the build the candidate's stack was running.
    string  candidate_commit_sha = 4;
    string  candidate_build_sha256 = 5;

    // Identifies the simulator build + opponent policy used.
    string  simulator_build_sha256 = 6;
    string  opponent_policy_sha256 = 7;
    string  opponent_tier          = 8;  // "bronze" | "silver" | "gold"

    // Outcome.
    enum Outcome {
        OUTCOME_UNSPECIFIED = 0;
        OUTCOME_WIN         = 1;
        OUTCOME_LOSS        = 2;
        OUTCOME_DRAW        = 3;
        OUTCOME_TIMEOUT     = 4;
    }
    Outcome outcome = 9;

    // Aggregate metrics.
    uint32 damage_dealt           = 10;
    uint32 damage_taken           = 11;
    uint32 projectiles_fired      = 12;
    uint32 armor_hits             = 13;  // subset of projectiles_fired that hit any armor

    // Latency from frame stamp to first acknowledged GimbalCmd, in nanoseconds.
    // p50 / p95 / p99 across the episode.
    uint64 aim_latency_p50_ns = 14;
    uint64 aim_latency_p95_ns = 15;
    uint64 aim_latency_p99_ns = 16;

    // Full event log. May be omitted (length 0) for short replays;
    // grading-grade runs always include it.
    repeated ProjectileEvent events = 17;
}
