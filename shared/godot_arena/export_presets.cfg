; Headless export targets for the Aiming Arena.
;
; The team builds these once on a maintainer's workstation with
; `godot --headless --export-release "<preset>" builds/<filename>` and
; pushes the resulting binaries to the public OSS bucket. Candidates
; never run godot themselves; they pull the pre-built binary via
; shared/scripts/fetch_assets.py (manifest entries:
;   godot-arena-linux-x86_64, godot-arena-windows-x86_64,
;   godot-arena-macos-universal).

[preset.0]

name="Linux x86_64 Server"
platform="Linux/X11"
runnable=true
custom_features="server,headless"
export_filter="all_resources"
export_path="builds/aiming_arena_linux.x86_64"
encryption_include_filters=""
encryption_exclude_filters=""

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=0
binary_format/embed_pck=true
binary_format/architecture="x86_64"
texture_format/bptc=true
texture_format/s3tc=true
texture_format/etc=false
texture_format/etc2=false

[preset.1]

name="Windows x86_64"
platform="Windows Desktop"
runnable=true
custom_features=""
export_filter="all_resources"
export_path="builds/aiming_arena_win64.exe"

[preset.1.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=0
binary_format/embed_pck=true
binary_format/architecture="x86_64"
texture_format/bptc=true
texture_format/s3tc=true

[preset.2]

name="macOS Universal"
platform="macOS"
runnable=true
custom_features=""
export_filter="all_resources"
export_path="builds/aiming_arena_macos.zip"

[preset.2.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=0
binary_format/embed_pck=true
binary_format/architecture="universal"
codesign/codesign=0
notarization/notarization=0
